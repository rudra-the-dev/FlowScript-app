name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 💣 Clean everything (no cursed cache)
      - name: Clean environment
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # ✅ Correct Python (matches buildozer.spec)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ⚙️ Install dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libstdc++6 wget unzip

          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # 📦 Install Android SDK properly (no assumptions)
      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          mv cmdline-tools latest

          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;33.0.0" \
            "ndk;25.1.8937393"

      # 🚀 Build APK (force APK, not AAB nonsense)
      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      # 📜 Show logs ALWAYS (even if build fails)
      - name: Show logs
        if: always()
        run: |
          echo "===== LAST 200 LINES ====="
          tail -n 200 build.log || echo "No log file found"

      # 📦 Upload APK (only if success)
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

      # 📜 Upload full logs
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
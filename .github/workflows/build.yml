name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 💣 CLEAN EVERYTHING (YES AGAIN)
      - name: Clean environment
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # ✅ Python (must match buildozer.spec)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ⚙️ Install system deps
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            libstdc++6

          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # 📦 Install Android SDK (properly)
      - name: Install Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          mv cmdline-tools latest

          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;33.0.0" \
            "ndk;25.1.8937393"

      # 🔥 CRITICAL FIX (your actual bug)
      - name: Fix sdkmanager path
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin

          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            /usr/local/lib/android/sdk/tools/bin/sdkmanager

          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/avdmanager \
            /usr/local/lib/android/sdk/tools/bin/avdmanager

      # 🚀 Build APK
      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log

      # 📜 Always show logs
      - name: Show logs
        if: always()
        run: |
          echo "===== LAST 200 LINES ====="
          tail -n 200 build.log || echo "No logs found"

      # 📦 Upload APK
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

      # 📜 Upload full logs
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
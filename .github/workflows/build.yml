name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libncurses5 libstdc++6
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # Create the log file immediately so the next step doesn't fail
          touch build.log
          
          # Force the SDK update and accept licenses
          # We use '|| true' here so the workflow continues to the Debug Log if this fails
          yes | buildozer android sdk_update 2>&1 | tee -a build.log || true
          
          # Run the actual build
          buildozer android debug 2>&1 | tee -a build.log
        continue-on-error: true 

      - name: Debug Log (The Truth Teller)
        if: always()
        run: |
          echo "--- ERROR SUMMARY START ---"
          if [ -s build.log ]; then
            # Show the last 100 lines to catch the specific Buildozer/Spec error
            tail -n 100 build.log
          else
            echo "The log is empty. This means the buildozer command itself is not found or pathing is broken."
          fi
          echo "--- ERROR SUMMARY END ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

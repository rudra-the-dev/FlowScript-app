name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libncurses5 libstdc++6
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          touch build.log
          
          # 1. Setup the Android SDK path manually to prevent 'Not Found' errors
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          
          # 2. Force-Accept ALL licenses (including the tricky 37-rc2 one)
          # We pipe 'yes' into the SDK update AND the build command
          yes | buildozer android sdk_update 2>&1 | tee -a build.log || true
          
          # 3. Manually create the build-tools folder if it's missing
          mkdir -p $ANDROID_SDK_ROOT/build-tools
          
          # 4. Run the actual build with the 'yes' pipe to handle any mid-build prompts
          yes | buildozer android debug 2>&1 | tee -a build.log
        continue-on-error: true 

      - name: Debug Log
        if: always()
        run: |
          echo "--- ERROR SUMMARY START ---"
          if [ -s build.log ]; then
            # We look for 'failed', 'error', or 'found' to see where the SDK stopped
            grep -i "error\|failed\|not found\|aidl\|exception" build.log | grep -v -i "license\|google\|terms" | tail -n 50
          else
            echo "The log is empty. Check System Dependencies."
          fi
          echo "--- ERROR SUMMARY END ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

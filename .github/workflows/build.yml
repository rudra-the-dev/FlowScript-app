name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython virtualenv

      - name: Accept licenses and setup SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.0" "platforms;android-31" "platform-tools" || true

      - name: First run to init buildozer SDK
        run: buildozer android debug || true

      - name: Copy SDK components into buildozer
        run: |
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BSDK/build-tools $BSDK/platforms
          cp -r $ANDROID_HOME/build-tools/33.0.0 $BSDK/build-tools/33.0.0 || true
          cp -r $ANDROID_HOME/platforms/android-31 $BSDK/platforms/android-31 || true

      - name: Build APK
        run: buildozer android debug 2>&1 | tee build.log || true

      - name: Show errors
        if: always()
        run: tail -100 build.log | grep -v -i "license\|you agree\|google\|terms\|shall\|hereby" || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk
          if-no-files-found: ignore

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

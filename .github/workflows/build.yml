name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libncurses5 \
            libstdc++6
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # We run the build and pipe output to build.log in the current directory
          # 'tee' allows us to see the live logs in GitHub while saving them to a file
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true 

      - name: Debug Log (Error Summary)
        if: always()
        run: |
          echo "--- Checking for Build Errors ---"
          if [ -f build.log ]; then
            # This filters out the license noise and shows only the actual failures
            grep -i "error\|failed\|not found\|aidl" build.log | grep -v -i "license\|google\|terms\|you agree" | tail -n 50
          else
            echo "Error: build.log was not created. Check the 'Install System Dependencies' step for failures."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk
          if-no-files-found: warn

name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython virtualenv

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | grep -E "(ERROR|error:|FAILED|Exception|cannot find|does not exist|warning:|BUILD)" | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FlowScript-APK
          path: bin/*.apk

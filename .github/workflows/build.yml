name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython virtualenv

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee /tmp/build.log || true
          echo "=== LAST 200 LINES ==="
          tail -200 /tmp/build.log | grep -v "License\|license\|TERMS\|Terms\|Android SDK\|You agree\|Google\|SHALL\|hereby\|pursuant\|jurisdiction\|warranty\|Warranty\|copyright\|Copyright\|intellectual\|provision\|agreement\|Agreement"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk
          if-no-files-found: ignore

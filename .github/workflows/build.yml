name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Upgraded for better tool compatibility

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv 

      - name: Pre-accept Buildozer SDK licenses
        run: |
          # Create the directory where Buildozer expects the SDK to avoid path errors
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          # Force accept all licenses within the Buildozer SDK path
          yes | sdkmanager --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses || true

      - name: Build APK
        # Removed "|| true" to ensure the workflow fails if the build actually fails
        run: buildozer android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 🔥 Clean everything (no cache corruption)
      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer

      # ✅ Match Python with buildozer.spec
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # ⚡ Install dependencies
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git zip unzip python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libncurses5 libstdc++6

          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # ✅ Install correct Android SDK + Build Tools
      - name: Install Android SDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH

          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-31" \
            "build-tools;33.0.0" \
            "platform-tools" || true

      # ✅ Install matching NDK
      - name: Install Android NDK
        run: |
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH

          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "ndk;25.1.8937393" || true

      # 🔧 Fix sdkmanager path (Buildozer being ancient)
      - name: Fix sdkmanager path
        run: |
          mkdir -p /usr/local/lib/android/sdk/tools/bin
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            /usr/local/lib/android/sdk/tools/bin/sdkmanager
          ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/avdmanager \
            /usr/local/lib/android/sdk/tools/bin/avdmanager

      # 🚀 Build APK
      - name: Build APK with Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.1.8937393
        run: |
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug

      # 📦 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

      # 📜 Upload logs if build fails
      - name: Upload Logs (if failed)
        if: failure()
        run: |
          echo "Build failed. Dumping logs..."
          tail -n 500 .buildozer/android/platform/build-*/build.log || true
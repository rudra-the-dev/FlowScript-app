name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # CACHE: Keeps your 1GB Android SDK downloads so the next build is 5x faster
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libncurses5 libstdc++6
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # FIX: Force-accept licenses and trigger SDK download manually
          # This solves the "Aidl not found" and "build-tools not found" errors
          yes | buildozer android sdk_update
          
          # Run the actual build
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true 

      - name: Debug Log
        if: always()
        run: |
          echo "--- Error Trace ---"
          if [ -f build.log ]; then
            # Filters out the long license text to show you the real Java/Python errors
            grep -i "error\|failed\|not found\|aidl" build.log | grep -v -i "license\|google\|terms\|you agree" | tail -n 50
          else
            echo "Build log not found. The SDK update likely failed or timed out."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 1. CACHE (Makes it 5x faster on 2nd run)
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libncurses5 libstdc++6
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer (Multi-core)
        run: |
          # The 'p4a.branch' and 'p4a.local_recipes' can speed up setup
          # Using '2>&1 | tee' to see live progress
          buildozer android debug 2>&1 | tee build.log
        continue-on-error: true 

      - name: Debug Log
        if: always()
        run: |
          echo "--- Error Trace ---"
          if [ -f build.log ]; then
            grep -i "error\|failed\|not found\|aidl" build.log | grep -v -i "license\|google\|terms\|you agree" | tail -n 50
          else
            echo "Build log not found."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk

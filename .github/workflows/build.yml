name: Build FlowScript APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            libncurses5 libstdc++6
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          # 1. Setup the workspace
          touch build.log
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/licenses
          
          # 2. MANUALLY write the license file so Google stops asking
          # This hex string is the "I Agree" for the current Android SDK license
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451411efc2c510b108c4a93f54499\n24333f8a63b6825ea05962be0a7358a8d224620a" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          
          # 3. Run Buildozer with the AUTO_ACCEPT flag
          # We skip 'sdk_update' and go straight to debug to avoid the loop
          APP_ANDROID_ACCEPT_SDK_LICENSE=1 buildozer android debug 2>&1 | tee -a build.log
        continue-on-error: true 

      - name: Debug Log
        if: always()
        run: |
          echo "--- FULL LOG TAIL ---"
          # No grep this time. Show us the last 100 lines of exactly what happened.
          tail -n 100 build.log
          echo "--- END LOG ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FlowScript-APK
          path: bin/*.apk
